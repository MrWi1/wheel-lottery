<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>宸星电竞大转盘</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at 30% 20%, #0b2a2f, #02070a 70%);
    color: #fff;
    overflow: hidden;
}

/* HUD */
.hud {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 10px;
    background: rgba(0,0,0,0.35);
    text-align: center;
    font-size: 14px;
    letter-spacing: 2px;
}

/* 主体 */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

/* 转盘外框 */
.wheel-box {
    position: relative;
    width: 90vw;
    max-width: 420px;
    aspect-ratio: 1 / 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* canvas */
canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 25px rgba(0,255,180,0.25);
}

/* 指针（居中上方） */
.pointer {
    position: absolute;
    top: -10px;
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-bottom: 26px solid #ffcc00;
}

/* 按钮 */
button {
    width: 60%;
    max-width: 240px;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #00d6a1;
    font-weight: bold;
    color: #000;
    touch-action: manipulation;
}

button:disabled {
    background: gray;
}

.msg {
    color: #00ffcc;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="hud">宸星电竞大转盘｜DELTA SYSTEM</div>

<div class="container">
    <div class="wheel-box">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
    </div>

    <button id="spinBtn">开始抽奖</button>
    <div class="msg" id="msg"></div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const msg = document.getElementById("msg");

let prizes = [
    { name: "双护体验单（138）", limit: 1, color:"#00d6a1" },
    { name: "陪玩立减20", limit: 20, color:"#1e90ff" },
    { name: "机密立减19", limit: 10, color:"#ffcc00" },
    { name: "绝密立减28", limit: 15, color:"#ff6b81" },
    { name: "九折趣味", limit: 10, color:"#a29bfe" }
];

let stockKey = "cx_stock";
let usedKey = "cx_used";

let stock = JSON.parse(localStorage.getItem(stockKey)) 
    || prizes.map(p=>p.limit);

if(localStorage.getItem(usedKey)){
    spinBtn.disabled = true;
    msg.innerText = "每人仅限一次";
}

let size;
let center;
let rotation = 0;
let spinning = false;

/* ====== 手机适配核心 ====== */
function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    size = canvas.width;
    center = size / 2;
    drawWheel(rotation);
}
window.addEventListener("resize", resizeCanvas);

/* ====== 绘制转盘 ====== */
function drawWheel(rot=0){
    ctx.clearRect(0,0,size,size);

    let angle = Math.PI * 2 / prizes.length;

    for(let i=0;i<prizes.length;i++){
        ctx.beginPath();
        ctx.moveTo(center,center);

        ctx.fillStyle = stock[i]>0 ? prizes[i].color : "#333";

        ctx.arc(center,center,center,
            i*angle + rot,
            (i+1)*angle + rot
        );

        ctx.fill();

        ctx.save();
        ctx.translate(center,center);
        ctx.rotate(i*angle + angle/2 + rot);
        ctx.fillStyle = "#000";
        ctx.font = Math.max(12, size*0.04)+"px Arial";
        ctx.textAlign = "right";
        ctx.fillText(prizes[i].name, center-10, 5);
        ctx.restore();
    }

    // 中心
    ctx.beginPath();
    ctx.arc(center,center,center*0.15,0,Math.PI*2);
    ctx.fillStyle = "#000";
    ctx.fill();

    ctx.fillStyle = "#00ffcc";
    ctx.textAlign = "center";
    ctx.font = "bold 14px Arial";
    ctx.fillText("GO", center, center+5);
}

/* ====== 初始化 ====== */
setTimeout(resizeCanvas, 100);

/* ====== 可用奖品 ====== */
function getAvailable(){
    let arr = stock.map((s,i)=>s>0?i:null).filter(v=>v!==null);
    return arr.length ? arr[Math.floor(Math.random()*arr.length)] : -1;
}

/* ====== 抽奖 ====== */
spinBtn.onclick = function(){
    if(spinning) return;
    if(localStorage.getItem(usedKey)) return;

    let index = getAvailable();
    if(index === -1){
        msg.innerText = "奖品已抽完";
        return;
    }

    spinning = true;
    spinBtn.disabled = true;

    let angle = Math.PI*2/prizes.length;
    let target = (Math.PI*2*5) + index*angle + angle/2;

    let start=null;
    let duration=3000;

    function anim(t){
        if(!start) start=t;
        let p = (t-start)/duration;
        if(p>1)p=1;

        rotation = target * (1 - Math.pow(1-p,3));
        drawWheel(rotation);

        if(p<1){
            requestAnimationFrame(anim);
        }else{
            finish(index);
        }
    }

    requestAnimationFrame(anim);
};

function finish(i){
    stock[i]--;
    localStorage.setItem(stockKey,JSON.stringify(stock));
    localStorage.setItem(usedKey,"1");

    msg.innerText = "获得：" + prizes[i].name;
    spinning=false;
}

</script>
</body>
</html>
